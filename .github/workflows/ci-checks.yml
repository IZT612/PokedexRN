name: PR Checks for Develop

on:
  pull_request:
    branches: ['develop']

jobs:
  validate-and-build:
    name: Validate Code and Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npx prettier --check .

      - name: Run Linter
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm run test

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
